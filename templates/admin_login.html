<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
  <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card p-4 fade-in" style="width:100%; max-width:400px;">
      <h3 class="mb-3 text-center">🔐 Admin Login</h3>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} rounded-3">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <input type="text" name="username" class="form-control search-box mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control search-box mb-3" placeholder="Password" required>
        <button type="submit" class="btn btn-gradient w-100">Login</button>
      </form>
      <p class="footer-note text-center mt-3">Demo credentials: admin / admin123</p>
      <div class="text-center mt-2">
        <a href="{{ url_for('index') }}" class="text-white-50">← Back to student portal</a>
      </div>
    </div>
  </div>
</body>
</html>
